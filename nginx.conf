server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Мастер-файлы переезда (.xlsx) идут через /api/migration/import — дефолтный лимит 1m их
  # режет (413). Синхронно с RequestSizeLimit (64 МБ) на бэкенде.
  client_max_body_size 64m;

  # Long-cache hashed static assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Reverse-proxy API calls to the backend container (single-origin: the browser
  # only ever talks to this nginx, so there is no CORS and the api needs no host
  # port). The trailing slashes strip the `/api` prefix, so a SPA request to
  # `/api/board` reaches the api container as `/board`.
  location /api/ {
    proxy_pass http://api:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA history fallback: route everything else to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
