server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed static assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA history fallback: route everything else to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
